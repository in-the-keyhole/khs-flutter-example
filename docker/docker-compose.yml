services:
  postgres:
    env_file:
      - ../.env.server
    image: postgres:16-alpine
    container_name: khs-flutter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-khs_flutter_api}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    env_file:
      - ../.env.server
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: khs-flutter-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-khs_flutter_api}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-1h}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-30d}
      - LDAP_URL=${LDAP_URL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_CREDENTIALS=${LDAP_BIND_CREDENTIALS}
      - LDAP_USER_DN_TEMPLATE=${LDAP_USER_DN_TEMPLATE}
      - LDAP_USER_SEARCH_BASE=${LDAP_USER_SEARCH_BASE}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      - FLUTTER_APP_URL=${FLUTTER_APP_URL:-http://localhost:8080}
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../server:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # Production server (use with docker compose --profile prod up)
  server-prod:
    env_file:
      - ../.env.server
    build:
      context: ../server
      dockerfile: Dockerfile
      target: production
    container_name: khs-flutter-api-prod
    restart: unless-stopped
    profiles:
      - prod
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-khs_flutter_api}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-1h}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-30d}
      - LDAP_URL=${LDAP_URL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_CREDENTIALS=${LDAP_BIND_CREDENTIALS}
      - LDAP_USER_DN_TEMPLATE=${LDAP_USER_DN_TEMPLATE}
      - LDAP_USER_SEARCH_BASE=${LDAP_USER_SEARCH_BASE}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - FLUTTER_APP_URL=${FLUTTER_APP_URL}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
