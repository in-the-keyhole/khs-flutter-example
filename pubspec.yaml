name: khs_flutter_example
description: "A new Flutter project."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  image_picker: ^1.0.7
  cowsay: ^1.1.0
  fllama: ^0.0.1
  file_picker: ^10.3.10
  http: ^1.6.0

dependency_overrides:
  fllama:
    path: packages/fllama

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  integration_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.1
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
